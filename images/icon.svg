<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="icon_green_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B4619;stop-opacity:1" /> <stop offset="100%" style="stop-color:#15803D;stop-opacity:1" /> </linearGradient>
    
    <filter id="logoShadow" x="0" y="0" width="200%" height="200%">
      <feOffset result="offOut" in="SourceAlpha" dx="2" dy="2" />
      <feGaussianBlur result="blurOut" in="offOut" stdDeviation="2" />
      <feBlend in="SourceGraphic" in2="blurOut" mode="normal" />
    </filter>
  </defs>

  <circle cx="256" cy="256" r="240" fill="#F8F9FA" />
  
  <g transform="translate(106, 206) scale(1.5)" opacity="0.6">
