  </g>
  
  <text x="256" y="295" font-family="'Crimson Pro', serif" font-size="64" font-weight="500" fill="#0B4619" text-anchor="middle">Manny Lab</text>

  <g transform="translate(136, 116) scale(6)" filter="url(#logoShadow)">
    <line x1="10" y1="10" x2="35" y2="15" stroke="#15803D" stroke-width="1.5" opacity="0.3" />
    <line x1="10" y1="10" x2="15" y2="40" stroke="#15803D" stroke-width="1.5" opacity="0.3" />
    <line x1="35" y1="15" x2="15" y2="40" stroke="#15803D" stroke-width="1.5" opacity="0.3" />
    
    <g transform="translate(10, 10)">
