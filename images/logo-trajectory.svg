<svg xmlns="http://www.w3.org/2000/svg" width="300" height="80" viewBox="0 0 300 80">
  <defs>
    <linearGradient id="traj_gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#002B36;stop-opacity:1" /> <stop offset="100%" style="stop-color:#014B5C;stop-opacity:1" /> </linearGradient>
    
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@500&amp;display=swap');
      .logo-text {
        font-family: 'Crimson Pro', serif;
        font-size: 36px;
        font-weight: 500;
        fill: #002B36; /* Deep Navy */
      }
    </style>
  </defs>

  <g transform="translate(15, 15)">
    <path d="M5 5 C15 -5, 25 10, 20 20 C15 30, 5 35, 5 45 C5 55, 15 60, 25 55" 
          stroke="url(#traj_gradient)" stroke-width="2" fill="none" />
    <path d="M0 25 C10 15, 20 20, 15 30 C10 40, 0 45, 0 55" 
          stroke="url(#traj_gradient)" stroke-width="2" fill="none" opacity="0.6"/>
    <path d="M30 10 C25 5, 15 15, 20 25 C25 35, 30 40, 30 50" 
          stroke="url(#traj_gradient)" stroke-width="2" fill="none" opacity="0.4"/>
          
    <circle cx="12.5" cy="35" r="4" fill="#014B5C" />
  </g>

  <text x="65" y="52" class="logo-text">Manny Lab</text>
  
  <rect x="0" y="75" width="300" height="2" fill="#e0e0e0" />

</svg>
