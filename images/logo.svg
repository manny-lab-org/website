<svg xmlns="http://www.w3.org/2000/svg" width="300" height="80" viewBox="0 0 300 80">
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@500&amp;display=swap');
      .logo-text { font-family: 'Crimson Pro', serif; font-size: 36px; fill: #002B36; }
      .main-link { stroke: #014B5C; stroke-width: 1.5; opacity: 0.5; }
    </style>
  </defs>
  <g transform="translate(15, 15)">
    <line x1="10" y1="10" x2="35" y2="15" class="main-link" />
    <line x1="10" y1="10" x2="15" y2="40" class="main-link" />
    <line x1="35" y1="15" x2="15" y2="40" class="main-link" />
    <g transform="translate(10, 10)">
      <rect x="-4" y="-4" width="8" height="8" fill="#002B36" />
      <rect x="-2" y="-2" width="4" height="4" fill="#014B5C" />
    </g>
    <g transform="translate(35, 15)">
      <rect x="-4" y="-4" width="8" height="8" fill="#002B36" />
      <rect x="-2" y="-2" width="4" height="4" fill="#014B5C" />
    </g>
    <g transform="translate(15, 40)">
      <rect x="-6" y="-6" width="12" height="12" fill="#014B5C" opacity="0.8" />
      <rect x="-3" y="-3" width="6" height="6" fill="#FFF" />
    </g>
  </g>
  <text x="80" y="52" class="logo-text">Manny Lab</text>
  <rect x="0" y="75" width="300" height="2" fill="#e0e0e0" />
</svg>
